<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Controle de Dormentes Rumo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <img class="login-marca-logo" src="assets/rumo/rumo-logo-azul.png" alt="Rumo" width="150" height="35">
      <h1>Controle de Dormentes</h1>
      <p>Entre com seu usuário autorizado para acessar os dados do sistema.</p>

      <form id="formLogin" class="login-form">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="email" required placeholder="seu.email@empresa.com">
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" autocomplete="current-password" required placeholder="Sua senha">
        </div>
        <button class="btn btn-primario" id="btnEntrar" type="submit">Entrar</button>
      </form>

      <div id="loginMensagem" class="login-msg"></div>

      <div class="login-nota">
        A criação de usuários está bloqueada. Apenas usuários criados no Supabase e cadastrados em <strong>usuarios_app</strong> conseguem entrar.
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>if(!window.supabase){document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\/script>');}</script>
  <script src="js/supabase-config.js?v=20260523-2"></script>
  <script src="js/auth.js?v=20260523-2"></script>
  <script src="js/login.js?v=20260523-2"></script>
</body>
</html>
